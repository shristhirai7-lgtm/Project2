<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Online Voting System</title>

<style>
/* Reset and Base Styles */
* {
  box-sizing: border-box;
}

body {
  font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  margin: 0;
  padding: 40px 15px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  
  /* UPDATED THEME: Emerald & Slate Gradient */
  background: linear-gradient(
      135deg, 
      rgba(16, 64, 58, 0.9), 
      rgba(43, 110, 93, 0.8)
    ), 
    url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=2000');
  
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* Glassmorphism Card Container */
.container {
  max-width: 500px;
  width: 100%;
  background: rgba(255, 255, 255, 0.98);
  padding: 35px;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(15px);
  transition: transform 0.3s ease;
}

.container:hover {
  transform: translateY(-5px);
}

/* Header Typography */
h1 {
  text-align: center;
  margin: 0 0 5px 0;
  font-size: 28px;
  color: #1a3c34; /* Deep Slate Green */
  letter-spacing: -0.5px;
}

.subtitle {
  text-align: center;
  color: #6a7d78;
  font-size: 14px;
  margin-bottom: 25px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}

/* Form Elements */
label {
  font-size: 13px;
  font-weight: 700;
  color: #2c3e50;
  margin-top: 15px;
  display: block;
  margin-bottom: 5px;
}

input[type="text"], select {
  width: 100%;
  padding: 14px;
  margin-bottom: 5px;
  border-radius: 12px;
  border: 1px solid #ceded9;
  background: #f4f9f7;
  font-size: 15px;
  transition: all 0.2s ease;
}

input:focus, select:focus {
  border-color: #27ae60; /* Emerald Focus */
  box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.15);
  outline: none;
  background: #fff;
}

/* Biometric Checkbox area */
.checkbox-group {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #eef9f5; /* Soft Mint */
  padding: 12px;
  border-radius: 12px;
  margin: 15px 0;
  border: 1px solid #d1e7dd;
}

.checkbox-group input {
  accent-color: #27ae60;
  width: 18px;
  height: 18px;
  cursor: pointer;
}

/* Multi-select ranking */
#ranking {
  min-height: 120px;
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  margin-top: 12px;
  font-size: 16px;
  cursor: pointer;
  font-weight: 700;
  transition: all 0.2s ease;
}

#voteBtn {
  background: linear-gradient(135deg, #27ae60, #1e8449);
  color: white;
  box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
}

#voteBtn:hover:not(:disabled) {
  background: linear-gradient(135deg, #2ecc71, #27ae60);
  box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
}

#voteBtn:disabled {
  background: #bdc3c7;
  cursor: not-allowed;
  box-shadow: none;
}

.voice-btn {
  background: #ffffff;
  border: 2px solid #27ae60;
  color: #1e8449;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.voice-btn:hover {
  background: #f0fdf4;
}

/* Feedback Sections */
.status {
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
  font-weight: 600;
  background: #d1e7dd;
  color: #0f5132;
  text-align: center;
  display: none;
  animation: fadeIn 0.4s ease;
}

#time {
  margin-top: 10px;
  color: #6a7d78;
  font-size: 13px;
  text-align: center;
}

.receipt {
  word-break: break-all;
  background: #f8f9fa;
  padding: 15px;
  margin-top: 15px;
  border-radius: 12px;
  border-left: 5px solid #27ae60;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: #1a3c34;
  display: none;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">Vote Now</h1>
  <div class="subtitle">Students Online Voting System</div>

  <label for="language">Preferred Language</label>
  <select id="language">
    <option value="en">English</option>
    <option value="fr">French</option>
  </select>

  <label for="studentId">Student Credentials</label>
  <input type="text" id="studentId" placeholder="Enter Student ID Number">

  <div class="checkbox-group">
    <input type="checkbox" id="biometric">
    <label for="biometric" style="margin:0; cursor:pointer;">Secure Biometric Verification</label>
  </div>

  <label for="ranking">Rank Candidates (Hold Ctrl/Cmd to select multiple)</label>
  <select id="ranking" multiple>
    <option value="Ankita">Ankita</option>
    <option value="Anand">Anand</option>
    <option value="Ram">Ram</option>
    <option value="Suku">Suku</option>
    <option value="Shristhi">Shristhi</option>
    <option value="Ashika">Ashika</option>
    <option value="Dipesh">Dipesh</option>
  </select>

  <button class="voice-btn" onclick="startVoice()">
    <span>🎙</span> Voice-Activated Vote
  </button>

  <button id="voteBtn">Submit Official Vote</button>

  <div class="status" id="status"></div>
  <div id="time"></div>
  <div class="receipt" id="receipt"></div>
</div>

<script>
// Logic remains identical to maintain functionality
const texts = {
  en: { title: "Vote Now", closed: "Voting session is currently closed (9 AM - 5 PM only)." },
  fr: { title: "Votez Maintenant", closed: "La session de vote est actuellement fermée (9h - 17h seulement)." }
};

const languageSelect = document.getElementById("language");
const voteBtn = document.getElementById("voteBtn");
const studentIdInput = document.getElementById("studentId");
const biometricCheckbox = document.getElementById("biometric");
const rankingSelect = document.getElementById("ranking");

languageSelect.onchange = e => {
  document.getElementById("title").innerText = texts[e.target.value].title;
};

function votingOpen() {
  const h = new Date().getHours();
  return h >= 9 && h <= 17;
}

function generateToken() {
  return Math.random().toString(36).substring(2, 12).toUpperCase();
}

let token = localStorage.getItem("voteToken");

voteBtn.onclick = () => {
  if (!votingOpen()) {
    alert(texts[languageSelect.value].closed);
    return;
  }

  if (token) {
    alert("System Security: You have already cast your vote for this session.");
    return;
  }

  const id = studentIdInput.value.trim();
  const bio = biometricCheckbox.checked;

  if (id.length < 5 || !bio) {
    alert("Verification failed: Please ensure Student ID is correct and Biometrics are verified.");
    return;
  }

  const rankings = Array.from(rankingSelect.selectedOptions).map(o => o.value);
  if (rankings.length === 0) {
    alert("Please select at least one candidate to rank.");
    return;
  }

  voteBtn.disabled = true;
  const statusBox = document.getElementById("status");
  statusBox.style.display = "block";
  statusBox.innerText = "Encrypting & Securing Vote... (5s)";

  setTimeout(() => {
    token = generateToken();
    localStorage.setItem("voteToken", token);
    
    const now = new Date().toLocaleString();
    document.getElementById("time").innerText = "Finalized on: " + now;
    
    const receiptVal = btoa(token + "|" + now);
    const receiptBox = document.getElementById("receipt");
    receiptBox.style.display = "block";
    receiptBox.innerText = "OFFICIAL RECEIPT: " + receiptVal;
    
    statusBox.style.background = "#d1e7dd";
    statusBox.style.color = "#0f5132";
    statusBox.innerText = "✔ Vote Recorded Successfully!";
  }, 5000);
};

function startVoice() {
  if (!("webkitSpeechRecognition" in window)) {
    alert("Your browser does not support voice recognition. Please try Chrome.");
    return;
  }
  const recognition = new webkitSpeechRecognition();
  recognition.lang = languageSelect.value === "fr" ? "fr-FR" : "en-US";
  recognition.onstart = () => {
    document.querySelector(".voice-btn").innerText = "Listening...";
  };
  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    alert("Voice command received: " + transcript);
    document.querySelector(".voice-btn").innerHTML = "<span>🎙</span> Voice-Activated Vote";
  };
  recognition.onerror = () => {
    document.querySelector(".voice-btn").innerHTML = "<span>🎙</span> Voice-Activated Vote";
  };
  recognition.start();
}
</script>

</body>
</html>
